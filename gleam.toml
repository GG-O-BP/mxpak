name = "mxpak"
version = "0.2.6"
target = "erlang"
description = "Mendix widget .mpk package manager — search, resolve, download, cache"
licences = ["MPL-2.0"]

[dependencies]
gleam_stdlib = ">= 0.49.0 and < 2.0.0"
gleam_json = ">= 1.0.0 and < 4.0.0"
gleam_erlang = ">= 0.34.0 and < 2.0.0"
gleam_http = ">= 4.0.0 and < 5.0.0"
gleam_otp = ">= 1.2.0 and < 2.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_crypto = ">= 1.5.0 and < 2.0.0"
tom = ">= 1.0.0 and < 2.0.0"
simplifile = ">= 2.0.1 and < 3.0.0"
chrobot_extra = ">= 5.0.5 and < 6.0.0"
shore = ">= 1.3.0 and < 2.0.0"
envoy = ">= 1.1.0 and < 2.0.0"
gleam_regexp = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
gleescript = ">= 1.5.0 and < 2.0.0"
gleeunit = ">= 1.0.0 and < 2.0.0"
